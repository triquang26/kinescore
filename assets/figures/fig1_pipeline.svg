<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" width="1100" height="340" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Marionette feasibility-ruler pipeline: video frames to frozen DINOv3-L to Readout-v2 to FK plus URDF, producing feasibility, temporal jerk, and sigma-gate outputs.">
  <rect x="0" y="0" width="1100" height="340" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="40" font-size="19" font-weight="600" fill="#111111">From video frames to a physics feasibility ruler</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- ==== main pipeline row (box centers on y=120) ==== -->
  <!-- Video frames -->
  <rect x="30" y="86" width="140" height="68" rx="9" fill="#ffffff" stroke="#333333" stroke-width="1.3"/>
  <text x="100" y="116" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">Video frames</text>
  <text x="100" y="136" text-anchor="middle" font-size="11.5" fill="#666666">RGB rollout</text>

  <line x1="172" y1="120" x2="204" y2="120" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Frozen DINOv3-L -->
  <rect x="206" y="86" width="150" height="68" rx="9" fill="#f4f4f4" stroke="#333333" stroke-width="1.3"/>
  <text x="281" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">Frozen DINOv3-L</text>
  <text x="281" y="132" text-anchor="middle" font-size="11.5" fill="#666666">&#10052; features, no grad</text>

  <line x1="358" y1="120" x2="390" y2="120" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Readout-v2 -->
  <rect x="392" y="82" width="266" height="76" rx="9" fill="#ffffff" stroke="#333333" stroke-width="1.3"/>
  <text x="525" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">Readout-v2</text>
  <text x="525" y="130" text-anchor="middle" font-size="11.5" fill="#666666">&#956; raw radians &#183; &#963; &#183; temporal window</text>

  <line x1="660" y1="120" x2="692" y2="120" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- FK + URDF -->
  <rect x="694" y="86" width="120" height="68" rx="9" fill="#ffffff" stroke="#333333" stroke-width="1.3"/>
  <text x="754" y="116" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">FK + URDF</text>
  <text x="754" y="136" text-anchor="middle" font-size="11.5" fill="#666666">3-D poses</text>

  <line x1="816" y1="120" x2="848" y2="120" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ==== three output chips (Okabe-Ito accents) ==== -->
  <!-- Feasibility -->
  <rect x="852" y="66" width="216" height="34" rx="17" fill="#ffffff" stroke="#009E73" stroke-width="1.6"/>
  <circle cx="874" cy="83" r="6" fill="#009E73"/>
  <text x="890" y="88" font-size="14" font-weight="600" fill="#111111">Feasibility</text>

  <!-- Temporal (jerk) -->
  <rect x="852" y="106" width="216" height="34" rx="17" fill="#ffffff" stroke="#E69F00" stroke-width="1.6"/>
  <circle cx="874" cy="123" r="6" fill="#E69F00"/>
  <text x="890" y="128" font-size="14" font-weight="600" fill="#111111">Temporal (jerk)</text>

  <!-- sigma-gate -->
  <rect x="852" y="146" width="216" height="34" rx="17" fill="#ffffff" stroke="#0072B2" stroke-width="1.6"/>
  <circle cx="874" cy="163" r="6" fill="#0072B2"/>
  <text x="890" y="168" font-size="14" font-weight="600" fill="#111111">&#963;-gate</text>

  <!-- ==== paired-protocol inset ==== -->
  <rect x="30" y="238" width="1038" height="64" rx="9" fill="#fafafa" stroke="#cccccc" stroke-width="1.1"/>
  <text x="52" y="266" font-size="13" font-weight="600" fill="#333333">Paired protocol</text>
  <text x="52" y="288" font-size="13" fill="#555555">&#966;(pred) &#8722; &#966;(gt), same episode &#8212; each metric measured on the generated and ground-truth rollout of one clip, then differenced.</text>
</svg>
